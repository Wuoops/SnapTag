services:
  db:
    image: postgres:16-alpine
    container_name: snaptag-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-snaptag}
      POSTGRES_USER: ${POSTGRES_USER:-snaptag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snaptag_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-snaptag}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snaptag-backend
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-your-secret-key-change-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      POSTGRES_DB: ${POSTGRES_DB:-snaptag}
      POSTGRES_USER: ${POSTGRES_USER:-snaptag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snaptag_secret_2024}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      CSRF_TRUST_ALL_ORIGINS: ${CSRF_TRUST_ALL_ORIGINS:-True}
    volumes:
      - media_data:/app/media
      - backup_data:/app/backups
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snaptag-frontend
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  backup_data:
  static_data:
